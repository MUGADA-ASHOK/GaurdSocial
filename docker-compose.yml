version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: guardsocial_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_DB_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: guardsocial-redis
    ports:
      - "6379:6379"